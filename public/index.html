<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brunel Chatbot Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8f8;
        color: #102a36;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 40px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0 0 24px;
        color: #47616b;
        font-size: 18px;
        line-height: 1.6;
      }

      .preview {
        min-height: 280px;
        border: 1px solid #d7e1e4;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brunel Chatbot MVP</h1>
      <p>This page lets you test the widget before adding it to Framer.</p>
      <div class="preview">
        <strong>Try the chat button in the bottom-right corner.</strong>
      </div>
    </main>
    <script src="/widget.js"></script>
  </body>
</html>
